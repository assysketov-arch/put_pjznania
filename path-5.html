<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root{--cream:#f5f1ea;--dark:#1a1610;--green:#1a5c2e;}

a{display:inline-block;margin-top:40px;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:var(--green);text-decoration:none;border-bottom:0.5px solid var(--green);padding-bottom:3px;}

</head>
